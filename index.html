<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌸 روز دختر مبارک 🌸</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
#loader{
position:fixed;
inset:0;
background:#ff69b4;
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
}

.loader-heart{
font-size:70px;
animation:pulse 1s infinite;
}

@keyframes pulse{
50%{transform:scale(1.3)}
}
*{
margin:0;
padding:0;
box-sizing:border-box;
unction
ont-family:'Vazirmatn',sans-serif;
}

body{
overflow-x:hidden;
background:linear-gradient(-45deg,#ff7eb3,#ff65a3,#c77dff,#ffd6e8);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
min-height:100vh;
color:white;
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.hearts{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
top:0;
left:0;
z-index:0;
}

.heart{
position:absolute;
color:#fff;
font-size:20px;
animation:float 8s linear infinite;
opacity:.7;
}

@keyframes float{
0%{
transform:translateY(100vh) rotate(0);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120px) rotate(360deg);
opacity:0;
}
}

.hero{
position:relative;
z-index:2;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.glass{
background:rgba(255,255,255,.15);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.2);
padding:40px;
border-radius:30px;
max-width:1100px;
box-shadow:0 10px 40px rgba(0,0,0,.15);
}

h1{
font-size:4rem;
margin-bottom:20px;
}

.typing{
font-size:1.4rem;
line-height:2.3;
min-height:140px;
}

.btn{
margin-top:25px;
padding:14px 35px;
border:none;
border-radius:50px;
background:white;
color:#ff4f9d;
font-size:1rem;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.08);
}

.section{
padding:80px 20px;
position:relative;
z-index:2;
}

.section-title{
text-align:center;
font-size:2.5rem;
margin-bottom:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:1200px;
margin:auto;
}

.card{
background:rgba(255,255,255,.15);
backdrop-filter:blur(12px);
padding:30px;
border-radius:25px;
text-align:center;
transition:.4s;
}

.card:hover{
transform:translateY(-10px);
}

.card .icon{
font-size:3rem;
margin-bottom:15px;
}

.quote{
max-width:900px;
margin:auto;
text-align:center;
font-size:2rem;
line-height:2;
}

.counter{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:40px;
}

.counter-box{
background:rgba(255,255,255,.15);
padding:25px;
border-radius:20px;
min-width:150px;
text-align:center;
}

.counter-box span{
display:block;
font-size:2rem;
font-weight:bold;
}

.personal{
max-width:700px;
margin:auto;
text-align:center;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:15px;
margin-bottom:15px;
font-size:1rem;
}

.output{
margin-top:20px;
font-size:1.3rem;
line-height:2;
}

.footer{
padding:30px;
text-align:center;
font-size:1.1rem;
}

#countdown{
font-size:1.5rem;
font-weight:bold;
text-align:center;
margin-top:20px;
}

.confetti{
position:fixed;
top:-10px;
width:10px;
height:10px;
z-index:9999;
animation:fall 5s linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
}
}

@media(max-width:768px){

h1{
font-size:2.5rem;
}

.typing{
font-size:1.1rem;
}

}

</style>
</head>
<body>

<div id="loader">
  <div class="loader-heart">🌻</div>
</div>

<div class="hearts" id="hearts"></div>

<section class="hero">
<div class="glass">

<h1>🌻🌻</h1>

<div class="typing" id="typing"></div>

</div>
</section>

<section class="section" id="message">

<h2 class="section-title">💖 پیام ویژه 💖</h2>

<div class="glass" style="max-width:900px;margin:auto;text-align:center;line-height:2.5;font-size:1.2rem;">

سر که هیج جانم را فدای خواهرم خواهم کرد


</div>

<section class="section">



<div id="countdown"></div>

</section>

<section class="section">

<div class="counter">

<div class="counter-box">
<span>❤️</span>
9999+ لبخند
</div>


<div class="counter-box">
<span>🌸</span>
5000+ آرزو
</div>
<div class="counter-box">
<span>🌙</span>
 this is not real moon 
real moon are watching this 
</div>

<div class="counter-box">
<span>✨</span>
بی‌نهایت امید
</div>

</div>


</section>

<footer class="footer">
💗طراحی شده با عشق برای عشق داداش 💗
</footer>

<script>

const text=
`
💖 و من جهانی دارم به نام خواهر دورت بگردم💖
`;

let i=0;

function typeWriter(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(typeWriter,40);
}
}
typeWriter();

function scrollToMessage(){
document.getElementById("message").scrollIntoView({
behavior:"smooth"
});
}

function generateMessage(){

const name=document.getElementById("name").value;

if(!name) return;

document.getElementById("output").innerHTML=
`🌷 ${name} عزیز 🌷<br>
روز دختر مبارک 💖<br>
امیدواریم همیشه شاد، موفق و پر از آرزوهای زیبا باشی ✨`;
}

function createHeart(){

const heart=document.createElement("div");
heart.classList.add("heart");

const emojis = ["💖", "🌻", "🌼"];
heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

heart.style.left=Math.random()*100+"%";
heart.style.fontSize=(15+Math.random()*30)+"px";

heart.style.animationDuration=
(5+Math.random()*5)+"s";

document.getElementById("hearts").appendChild(heart);

setTimeout(()=>{
heart.remove();
},10000);
}


setInterval(createHeart,300);


setInterval(countdown,1000);

function confetti(){

for(let i=0;i<120;i++){

const c=document.createElement("div");

c.classList.add("confetti");

c.style.left=Math.random()*100+"%";

c.style.background=
`hsl(${Math.random()*360},100%,70%)`;

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},5000);

}

}

window.onload=confetti;
window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},1800);
});

</script>

</body>
</html>
